name: TestFlight Continuous Deployment

on:
  push:
    branches:
      - staging # Triggers the build automatically on every single commit to staging

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true # Cancels an older build if a new commit is pushed immediately after

jobs:
  build-and-deploy:
    name: TestFlight Upload
    runs-on: macos-15 # Standard GitHub macOS runner environment

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # ADD THIS STEP HERE 👇
      - name: Setup Keychain
        run: |
          # Create a temporary keychain for Xcode signing
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          # Increase timeout so the keychain doesn't lock mid-build
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Install Fastlane
        run: |
          gem install bundler
          bundle install

      - name: Execute Fastlane Beta Lane
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: https://x-token-auth:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/DhamodaranSri/ios-certificates-fpil.git
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          MATCH_P12_PASSWORD: "12345"
          
          # ADD THIS ENV VARIABLE TO FORCE FASTLANE TO USE THE KEYCHAIN 👇
          MATCH_KEYCHAIN_NAME: "build.keychain"
          MATCH_KEYCHAIN_PASSWORD: "12345"
        run: bundle exec fastlane deploy_testflight
